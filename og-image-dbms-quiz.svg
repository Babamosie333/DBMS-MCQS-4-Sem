  <line x1="80" y1="500" x2="1120" y2="500" stroke="#1a4060" stroke-width="0.8" opacity="0.6"/>

  <!-- Footer text -->
  <text x="100"  y="528" font-family="'Courier New', Courier, monospace" font-size="13" fill="#3a6880" letter-spacing="2">// INTERACTIVE MCQ ASSESSMENT //</text>
  <text x="1100" y="528" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="13" fill="#00ffe7" letter-spacing="1" opacity="0.8">github.com/Babamosie333</text>
  <circle cx="600" cy="524" r="2" fill="#1a4060"/>

  <!-- Scan lines -->
  <rect x="0" y="0"   width="1200" height="2" fill="#00ffe7" opacity="0.04"/>
  <rect x="0" y="210" width="1200" height="1" fill="#00ffe7" opacity="0.03"/>
  <rect x="0" y="420" width="1200" height="1" fill="#00ffe7" opacity="0.03"/>
  <rect x="0" y="628" width="1200" height="2" fill="#00ffe7" opacity="0.04"/>
