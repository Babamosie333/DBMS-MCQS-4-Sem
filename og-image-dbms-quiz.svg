  <text x="323" y="449" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#00ffe7" letter-spacing="2" opacity="0.7">QUESTIONS</text>
  <text x="323" y="466" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#e0f7fa">100 MCQs</text>

  <rect x="438" y="430" width="190" height="44" rx="8" fill="#061424" stroke="#1a4060" stroke-width="1"/>
  <text x="533" y="449" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#a78bfa" letter-spacing="2" opacity="0.7">COVERAGE</text>
  <text x="533" y="466" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#e0f7fa">5 Full Units</text>

  <rect x="648" y="430" width="190" height="44" rx="8" fill="#061424" stroke="#1a4060" stroke-width="1"/>
  <text x="743" y="449" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#39ff14" letter-spacing="2" opacity="0.7">INSTANT</text>
  <text x="743" y="466" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#e0f7fa">Live Feedback</text>

  <rect x="858" y="430" width="190" height="44" rx="8" fill="#061424" stroke="#1a4060" stroke-width="1"/>
  <text x="953" y="449" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ffd700" letter-spacing="2" opacity="0.7">SCORING</text>
  <text x="953" y="466" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#e0f7fa">Auto Graded</text>

