<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1a4060" stroke-width="0.8" opacity="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020b14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#020b14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe7"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#00ffe7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe7"/>
      <stop offset="40%" stop-color="#e0f7fa"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#00ffe7"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#020b14"/>
  <rect width="1200" height="630" fill="url(#grid)" clip-path="url(#clip)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowRight)"/>

  <!-- Corner brackets — top left -->
  <line x1="40" y1="40" x2="160" y2="40" stroke="#00ffe7" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="40" x2="40" y2="140" stroke="#00ffe7" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="40" x2="70"  y2="40" stroke="#00ffe7" stroke-width="3"   opacity="1"/>
  <line x1="40" y1="40" x2="40"  y2="70" stroke="#00ffe7" stroke-width="3"   opacity="1"/>

  <!-- Corner brackets — top right -->
  <line x1="1160" y1="40" x2="1040" y2="40"  stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="1160" y1="40" x2="1160" y2="140" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="1160" y1="40" x2="1130" y2="40"  stroke="#a78bfa" stroke-width="3"   opacity="1"/>
  <line x1="1160" y1="40" x2="1160" y2="70"  stroke="#a78bfa" stroke-width="3"   opacity="1"/>

  <!-- Corner brackets — bottom left -->
  <line x1="40" y1="590" x2="160" y2="590" stroke="#00ffe7" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="590" x2="40"  y2="490" stroke="#00ffe7" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="590" x2="70"  y2="590" stroke="#00ffe7" stroke-width="3"   opacity="1"/>
  <line x1="40" y1="590" x2="40"  y2="560" stroke="#00ffe7" stroke-width="3"   opacity="1"/>

  <!-- Corner brackets — bottom right -->
  <line x1="1160" y1="590" x2="1040" y2="590" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="1160" y1="590" x2="1160" y2="490" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
