    <ellipse cx="100" cy="36"  rx="100" ry="28" fill="#00ffe7"/>
    <rect x="0" y="36" width="200" height="120" fill="#00ffe7"/>
    <ellipse cx="100" cy="156" rx="100" ry="28" fill="#00ffe7"/>
